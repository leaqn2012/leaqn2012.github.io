<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inicio de sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Roboto, sans-serif;
            background-color: #2c386b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Card ─────────────────────────────────────── */
        .card {
            background: #ffffff;
            box-shadow: rgba(0, 15, 31, 0.36) 9px 10px 6px -6px;
            width: 100%;
            max-width: 442px;
            padding: 40px 70px;
        }

        @media (max-width: 480px) {
            .card { padding: 30px 28px; }
        }

        /* ── Logo ─────────────────────────────────────── */
        .logo-wrap {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-wrap img {
            max-height: 95px;
            max-width: 100%;
        }

        /* Fallback si la imagen no carga */
        .logo-fallback {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo-fallback .escudo {
            width: 70px;
            height: 70px;
        }

        .logo-fallback .text-pj {
            font-size: 16px;
            font-weight: 700;
            color: #2c386b;
            letter-spacing: 1px;
        }

        .logo-fallback .text-mza {
            font-size: 11px;
            color: #495057;
            letter-spacing: 2px;
        }

        /* ── Inputs ───────────────────────────────────── */
        .inputs-wrap {
            margin-bottom: 20px;
        }

        .inputs-wrap input {
            display: block;
            width: 100%;
            padding: 10px;
            border: 0.8px solid #ced4da;
            border-radius: 0;
            font-family: Roboto, sans-serif;
            font-size: 14px;
            color: #495057;
            background: #ffffff;
            outline: none;
            /* Overlap borders so they share the middle line */
            margin-bottom: -0.8px;
            position: relative;
            z-index: 0;
            transition: border-left 0.1s;
        }

        .inputs-wrap input:focus {
            border-left: 3px solid #4272d7;
            z-index: 1;
        }

        .inputs-wrap input::placeholder {
            color: #6c757d;
        }

        /* ── Status messages ──────────────────────────── */
        .status-msg {
            display: none;
            font-size: 13px;
            padding: 8px 10px;
            margin-bottom: 12px;
            text-align: center;
            line-height: 1.4;
        }

        .status-msg.loading {
            display: block;
            color: #4272d7;
        }

        .status-msg.error {
            display: block;
            color: #842029;
            background: #f8d7da;
            border: 0.8px solid #f5c2c7;
        }

        .status-msg.success {
            display: block;
            color: #0f5132;
            background: #d1e7dd;
            border: 0.8px solid #badbcc;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #b3c8f7;
            border-top-color: #4272d7;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Botón INGRESAR ───────────────────────────── */
        .btn-ingresar {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: #4272d7;
            color: #ffffff;
            border: 0.8px solid #4272d7;
            border-radius: 0;
            font-family: Roboto, sans-serif;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 18px;
            transition: background 0.15s;
        }

        .btn-ingresar:hover:not(:disabled) {
            background: #3461c4;
            border-color: #3461c4;
        }

        .btn-ingresar:disabled {
            background: #7a9de0;
            border-color: #7a9de0;
            cursor: not-allowed;
        }

        /* ── Links ────────────────────────────────────── */
        .links {
            text-align: center;
        }

        .links a {
            display: block;
            color: #495057;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .links a:hover {
            text-decoration: underline;
            color: #2c386b;
        }

        /* ── Nota de seguridad (fuera del card) ────────── */
        .security-note {
            margin-top: 14px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            max-width: 442px;
            line-height: 1.5;
        }

        .security-note b {
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Logo oficial -->
        <div class="logo-wrap">
            <img
                id="logo-img"
                src="https://iol.jus.mendoza.gov.ar/auth/resources/grg6s/login/iol-mendoza/img/logo-transparente.png"
                alt="Poder Judicial Provincia de Mendoza"
                onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
            >
            <!-- Fallback SVG si la imagen no carga -->
            <div id="logo-fallback" class="logo-fallback">
                <svg class="escudo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" fill="#2c386b" stroke="#aaa" stroke-width="2"/>
                    <text x="50" y="45" text-anchor="middle" fill="white" font-size="9" font-family="Roboto,sans-serif" font-weight="bold">PODER</text>
                    <text x="50" y="57" text-anchor="middle" fill="white" font-size="9" font-family="Roboto,sans-serif" font-weight="bold">JUDICIAL</text>
                    <text x="50" y="70" text-anchor="middle" fill="#ddd" font-size="7" font-family="Roboto,sans-serif">MENDOZA</text>
                </svg>
            </div>
        </div>

        <!-- Formulario -->
        <form id="login-form" autocomplete="off" novalidate>

            <!-- Mensajes de estado -->
            <div id="status" class="status-msg"></div>

            <!-- Inputs -->
            <div class="inputs-wrap">
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="CUIT"
                    inputmode="numeric"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    required
                >
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Contraseña"
                    autocomplete="current-password"
                    required
                >
            </div>

            <!-- Botón -->
            <button type="submit" class="btn-ingresar" id="btn-submit">
                INGRESAR
            </button>

            <!-- Links (igual al portal oficial) -->
            <div class="links">
                <a href="https://iol.jus.mendoza.gov.ar/iol-ui/p/inicio" target="_blank" rel="noopener">
                    Crear Usuario
                </a>
                <a href="https://iol.jus.mendoza.gov.ar/auth/realms/iol-mendoza/login-actions/reset-credentials" target="_blank" rel="noopener">
                    Recuperar Contraseña
                </a>
            </div>

        </form>
    </div>

    <!-- Nota de seguridad discreta fuera del card -->
    <div class="security-note">
        Tu contraseña se envía <b>directamente</b> al servidor oficial del Poder Judicial
        (HTTPS). <b>Nunca pasa por nuestros servidores.</b>
    </div>

    <script>
    (function () {
        'use strict';

        /* ── Configuración por portal ──────────────────── */
        const PORTALS = {
            iol: {
                tokenUrl: 'https://iol.jus.mendoza.gov.ar/auth/realms/iol-mendoza/protocol/openid-connect/token',
                clientId: 'iol-ui',
                scope: 'openid offline_access',
                serverAuth: false,
            },
            pjn: {
                // PJN NO soporta grant_type=password, la auth se hace server-side
                serverAuth: true,
            }
        };

        const UI_CONFIG = {
            iol: {
                title: 'Plataforma Digital del Poder Judicial de Mendoza',
                userPlaceholder: 'CUIT',
                validationHint: 'Completá CUIT y contraseña.',
                logoUrl: 'https://iol.jus.mendoza.gov.ar/auth/resources/grg6s/login/iol-mendoza/img/logo-transparente.png',
                logoAlt: 'Poder Judicial Provincia de Mendoza',
                fallbackTexts: ['PODER', 'JUDICIAL', 'MENDOZA'],
                registerUrl: 'https://iol.jus.mendoza.gov.ar/iol-ui/p/inicio',
                resetUrl: 'https://iol.jus.mendoza.gov.ar/auth/realms/iol-mendoza/login-actions/reset-credentials',
                securityNote: 'Tu contraseña se envía <b>directamente</b> al servidor oficial del Poder Judicial (HTTPS). <b>Nunca pasa por nuestros servidores.</b>',
            },
            pjn: {
                title: 'Portal PJN Federal',
                userPlaceholder: 'CUIL / CUIT',
                validationHint: 'Completá CUIL/CUIT y contraseña.',
                logoUrl: null,
                logoAlt: 'Poder Judicial de la Nación',
                fallbackTexts: ['PODER', 'JUDICIAL', 'DE LA NACIÓN'],
                registerUrl: 'https://sso.pjn.gov.ar/auth/realms/pjn/login-actions/registration?client_id=pjn-portal',
                resetUrl: 'https://sso.pjn.gov.ar/auth/realms/pjn/login-actions/reset-credentials?client_id=pjn-portal',
                securityNote: 'Tu contraseña se envía por conexión segura (HTTPS) para obtener un token de sesión. <b>Se usa una sola vez y no se almacena.</b>',
            },
        };

        const params  = new URLSearchParams(window.location.search);
        const portalKey = params.get('portal') || 'iol';
        const portal  = PORTALS[portalKey] || PORTALS.iol;
        const ui      = UI_CONFIG[portalKey] || UI_CONFIG.iol;
        const callbackUrl = params.get('callback') || '';

        /* ── Aplicar UI dinámica ──────────────────────── */
        document.title = ui.title + ' | Inicio de sesión';
        document.getElementById('username').placeholder = ui.userPlaceholder;
        document.querySelector('.security-note').innerHTML = ui.securityNote;
        document.querySelector('.links a:first-child').href = ui.registerUrl;
        document.querySelector('.links a:last-child').href = ui.resetUrl;

        // Logo
        const logoImg = document.getElementById('logo-img');
        const logoFallback = document.getElementById('logo-fallback');
        if (ui.logoUrl) {
            logoImg.src = ui.logoUrl;
            logoImg.alt = ui.logoAlt;
        } else {
            logoImg.style.display = 'none';
            logoFallback.style.display = 'flex';
        }
        // Actualizar textos del SVG fallback
        const svgTexts = logoFallback.querySelectorAll('text');
        if (svgTexts.length >= 3 && ui.fallbackTexts) {
            svgTexts[0].textContent = ui.fallbackTexts[0];
            svgTexts[1].textContent = ui.fallbackTexts[1];
            svgTexts[2].textContent = ui.fallbackTexts[2];
        }

        /* ── Telegram WebApp ────────────────────────────── */
        const tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        /* ── Helpers UI ─────────────────────────────────── */
        const statusEl = document.getElementById('status');
        const btn      = document.getElementById('btn-submit');

        function showStatus(msg, type) {
            statusEl.className = 'status-msg ' + type;
            statusEl.innerHTML = type === 'loading'
                ? '<span class="spinner"></span>' + msg
                : msg;
        }

        function resetBtn() {
            btn.disabled    = false;
            btn.textContent = 'INGRESAR';
        }

        /* ── Submit ─────────────────────────────────────── */
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showStatus(ui.validationHint, 'error');
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Conectando...';
            showStatus('Verificando credenciales...', 'loading');

            try {
                let payload;

                if (portal.serverAuth) {
                    // ── Auth server-side (PJN): enviar credenciales al callback ──
                    // PJN no soporta grant_type=password, el servidor hace el flujo auth code
                    if (!callbackUrl) {
                        throw new Error('Error de configuración: falta WEBAPP_CALLBACK_URL.');
                    }
                    payload = {
                        portal:    portalKey,
                        cuit:      username,
                        password:  password,
                        init_data: (tg && tg.initData) ? tg.initData : '',
                    };
                } else {
                    // ── Auth client-side (IOL): grant_type=password directo ──
                    const body = new URLSearchParams({
                        grant_type: 'password',
                        client_id:  portal.clientId,
                        username:   username,
                        password:   password,
                        scope:      portal.scope,
                    });

                    const resp = await fetch(portal.tokenUrl, {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body:    body.toString(),
                    });

                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error_description || err.error || 'Error de autenticación');
                    }

                    const data = await resp.json();
                    if (!data.refresh_token) {
                        throw new Error('El servidor no devolvió token de sesión.');
                    }

                    payload = {
                        portal:        portalKey,
                        cuit:          username,
                        refresh_token: data.refresh_token,
                    };
                }

                showStatus('Enviando al bot...', 'loading');
                btn.textContent = '✓';

                // Enviar al bot vía callback URL o sendData
                if (callbackUrl) {
                    if (!payload.init_data) {
                        payload.init_data = (tg && tg.initData) ? tg.initData : '';
                    }
                    const cbResp = await fetch(callbackUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'ngrok-skip-browser-warning': 'true',
                        },
                        body: JSON.stringify(payload),
                    });
                    if (!cbResp.ok) {
                        const cbErr = await cbResp.json().catch(() => ({}));
                        const errMsg = cbErr.error || 'Error al enviar datos al bot';
                        if (errMsg === 'premium_required') {
                            throw new Error('Esta función requiere un plan Premium o Pro.');
                        }
                        throw new Error(errMsg);
                    }
                    showStatus('✓ ¡Sesión guardada! Cerrando...', 'success');
                    if (tg) {
                        let closeAttempts = 0;
                        const tryClose = () => {
                            closeAttempts++;
                            try { tg.close(); } catch (_) {}
                            if (closeAttempts < 3) {
                                setTimeout(tryClose, 1000);
                            } else {
                                showStatus('✓ ¡Sesión guardada! Podés cerrar esta ventana.', 'success');
                            }
                        };
                        setTimeout(tryClose, 1500);
                    }
                } else if (tg && tg.sendData) {
                    showStatus(
                        'Error de configuración del servidor: no se puede enviar la sesión al bot. '
                        + 'Contactá al administrador (falta WEBAPP_CALLBACK_URL).',
                        'error'
                    );
                    resetBtn();
                } else {
                    console.log('[dev] payload:', payload);
                    showStatus('Token OK (modo dev — abrí desde Telegram para enviar al bot).', 'success');
                    resetBtn();
                }

            } catch (err) {
                console.error('Login error:', err);
                let msg = err.message;
                if (/invalid.*(user|grant|credentials)/i.test(msg)) {
                    msg = 'CUIT o contraseña incorrectos.';
                } else if (/fetch|network/i.test(msg)) {
                    msg = 'Sin conexión con el servidor. Verificá tu internet.';
                }
                showStatus(msg, 'error');
                resetBtn();
            }
        });
    })();
    </script>
</body>
</html>
